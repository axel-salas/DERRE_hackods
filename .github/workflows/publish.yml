name: Publish Quarto Dashboard

on:
  push:
    branches: [main]

# Grant write permissions to the GITHUB_TOKEN
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@main
        with:
          version: 1.6.0   # Replace with a valid Quarto version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Jupyter dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbformat

      - name: Render Quarto Project
        run: quarto render dashboard.qmd

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
